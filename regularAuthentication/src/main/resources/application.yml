spring:
  application:
    name: regularAuthentication

  datasource:
    url: jdbc:postgresql://localhost:5432/regular_authentication
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 9090

logging:
  level:
    org.springframework.security: WARN
    org.springframework.web.cors: WARN
